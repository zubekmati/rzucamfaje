name: Daily publish

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 09:00 czasu polskiego (CEST)
  workflow_dispatch:        # ręczne uruchomienie z GitHub UI (przycisk Run workflow)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel rebuild
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
