<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Zielone tło z zaokrąglonymi rogami -->
  <rect width="32" height="32" rx="7" fill="#15803d"/>
  <!-- Okrąg -->
  <circle cx="16" cy="16" r="11" stroke="white" stroke-width="2"/>
  <!-- Korpus papierosa -->
  <rect x="7" y="14" width="12" height="4" rx="2" fill="white"/>
  <!-- Filtr -->
  <rect x="19" y="14" width="4" height="4" rx="1" fill="#86efac"/>
  <!-- Przekreślenie ukośne -->
  <line x1="7" y1="7" x2="25" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
